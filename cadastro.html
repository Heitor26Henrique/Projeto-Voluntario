<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro de Necessidade</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

    <div class="logo">

        🤝 Conecta Voluntário

    </div>

    <nav>

        <a href="index.html">Home</a>

        <a href="cadastro.html">Cadastrar</a>

        <a href="necessidades.html">Necessidades</a>

    </nav>

</header>

<main class="pagina-cadastro">

    <div class="form-card">
<h1>Cadastro de Necessidade</h1>

<p>
    Preencha as informações abaixo para cadastrar uma nova necessidade.
</p>

<div id="mensagem"></div>
<form id="formCadastro">

    <div class="campo">

        <label for="instituicao">Nome da Instituição</label>

        <input
            type="text"
            id="instituicao"
            placeholder="Digite o nome da instituição"
            required>

    </div>

    <div class="campo">

        <label for="tipoAjuda">Tipo de Ajuda</label>

        <select id="tipoAjuda" required>

            <option value="">Selecione</option>

            <option>Educação</option>

            <option>Saúde</option>

            <option>Meio Ambiente</option>

            <option>Doação de Alimentos</option>

            <option>Doação de Roupas</option>

            <option>Outros</option>

        </select>

    </div>

    <div class="campo">

        <label for="titulo">Título da Necessidade</label>

        <input
            type="text"
            id="titulo"
            placeholder="Ex: Reforço Escolar"
            required>

    </div>

    <div class="campo">

        <label for="descricao">Descrição</label>

        <textarea
            id="descricao"
            rows="5"
            placeholder="Descreva a necessidade..."
            required></textarea>

    </div>

    <div class="campo">

        <label for="cep">CEP</label>

        <input
            type="text"
            id="cep"
            placeholder="00000-000"
            maxlength="9"
            required>

    </div>

    <div class="campo">

        <label for="rua">Rua</label>

        <input
            type="text"
            id="rua"
            readonly>

    </div>

    <div class="campo">

        <label for="bairro">Bairro</label>

        <input
            type="text"
            id="bairro"
            readonly>

    </div>

    <div class="campo">

        <label for="cidade">Cidade</label>

        <input
            type="text"
            id="cidade"
            readonly>

    </div>

    <div class="campo">

        <label for="estado">Estado</label>

        <input
            type="text"
            id="estado"
            readonly>

    </div>

    <div class="campo">

        <label for="contato">Contato</label>

        <input
            type="text"
            id="contato"
            placeholder="E-mail ou telefone"
            required>

    </div>

    <button type="submit" class="btn">

        Cadastrar Necessidade

    </button>

</form>

    </div>

</main>

<footer>

    <h3>Conecta Voluntário</h3>

    <p>
        Conectando pessoas que desejam ajudar.
    </p>

    <p class="copyright">
        © 2026
    </p>

</footer>

<script src="js/viacep.js"></script>
<script src="js/cadastro.js"></script>

</body>

</html>
